<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      <!-- .bg { fill: transparent; } -->
      .grid { stroke: #1f2a44; stroke-width: 1; }
      .orbit { stroke: #4cc9f0; stroke-width: 2; fill: none; }
      .nucleus { fill: #f72585; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="48" height="48" rx="8" class="bg"/>

  <!-- Grid (expanded) -->
  <g>
    <line x1="8" y1="10" x2="40" y2="10" class="grid"/>
    <line x1="8" y1="24" x2="40" y2="24" class="grid"/>
    <line x1="8" y1="38" x2="40" y2="38" class="grid"/>
    <line x1="10" y1="8" x2="10" y2="40" class="grid"/>
    <line x1="24" y1="8" x2="24" y2="40" class="grid"/>
    <line x1="38" y1="8" x2="38" y2="40" class="grid"/>
  </g>

  <!-- Atom orbit (bigger) -->
  <ellipse cx="24" cy="24" rx="14" ry="9" class="orbit" transform="rotate(25 24 24)"/>
  <ellipse cx="24" cy="24" rx="14" ry="9" class="orbit" transform="rotate(-25 24 24)"/>

  <!-- Nucleus (slightly bigger) -->
  <circle cx="24" cy="24" r="3" class="nucleus"/>

  <!-- Electron (pushed outward) -->
  <circle cx="36" cy="17" r="2" fill="#4cf090"/>
</svg>